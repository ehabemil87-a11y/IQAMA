<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --brand:#8B6914;--brand-light:#C49A2A;
  --bg:#F5F0E8;--surface:#FFF;--border:#E2D5B8;
  --text:#1A1208;--text-2:#4A3B1C;--text-3:#8B7A55;
  --red:#DC2626;--red-bg:#FEF2F2;
  --orange:#EA580C;--orange-bg:#FFF7ED;
  --yellow:#D97706;--yellow-bg:#FFFBEB;
  --green:#16A34A;--green-bg:#F0FDF4;
  --blue:#1D4ED8;--blue-bg:#EFF6FF;
  --shadow:0 2px 12px rgba(139,105,20,.1);
  --radius:12px;
}
html[data-dark]{--bg:#0F0B05;--surface:#1A1208;--border:#3A2E16;--text:#F5EDD8;--text-2:#C9B87A;--text-3:#7A6A45;--red-bg:#3B1212;--orange-bg:#2D1800;--yellow-bg:#292000;--green-bg:#052E16;--blue-bg:#1e3a5f;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);direction:rtl;}

/* TOPBAR */
.topbar{background:linear-gradient(135deg,#1a0f02,#3d2409);padding:12px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.3);}
.topbar-brand{color:#C49A2A;font-size:16px;font-weight:800;}
.topbar-sub{color:rgba(255,255,255,.4);font-size:10px;letter-spacing:1px;}
.topbar-right{margin-right:auto;display:flex;align-items:center;gap:8px;}
.conn-info{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.5);}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--yellow);display:inline-block;}
.btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:.15s;}
.btn:hover{border-color:var(--brand);color:var(--brand);}
.btn-gold{background:linear-gradient(135deg,#C49A2A,#8B6914);color:#fff;border:none;}
.dark-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:4px;}

/* MAIN */
.main{padding:24px;max-width:1400px;margin:0 auto;}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);cursor:pointer;transition:.2s;border-top:3px solid transparent;}
.kpi:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(139,105,20,.15);}
.kpi-val{font-size:28px;font-weight:800;line-height:1;}
.kpi-lbl{font-size:11px;color:var(--text-3);margin-top:4px;}
.kpi.red{border-top-color:var(--red);} .kpi.red .kpi-val{color:var(--red);}
.kpi.orange{border-top-color:var(--orange);} .kpi.orange .kpi-val{color:var(--orange);}
.kpi.yellow{border-top-color:var(--yellow);} .kpi.yellow .kpi-val{color:var(--yellow);}
.kpi.green{border-top-color:var(--green);} .kpi.green .kpi-val{color:var(--green);}
.kpi.blue{border-top-color:var(--blue);} .kpi.blue .kpi-val{color:var(--blue);}
.kpi.brand{border-top-color:var(--brand);} .kpi.brand .kpi-val{color:var(--brand);}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
.chart-title{font-size:13px;font-weight:700;color:var(--text-2);margin-bottom:12px;}
.chart-wrap{position:relative;height:200px;}

/* TABS */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.tab{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-2);font-size:12px;cursor:pointer;transition:.15s;font-weight:600;}
.tab:hover{border-color:var(--brand);color:var(--brand);}
.tab.active{background:var(--brand);color:#fff;border-color:var(--brand);}
.tab-badge{background:rgba(255,255,255,.25);border-radius:10px;padding:1px 7px;font-size:10px;margin-right:4px;}
.tab.active .tab-badge{background:rgba(255,255,255,.3);}
.tab:not(.active) .tab-badge{background:var(--red-bg);color:var(--red);}

/* ALERTS */
.alert-banner{background:linear-gradient(135deg,#FEF3C7,#FFFBEB);border:2px solid #F59E0B;border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;}
.alert-banner-title{font-size:13px;font-weight:700;color:#D97706;margin-bottom:8px;}

/* FILTERS */
.filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;box-shadow:var(--shadow);}
.filter-input{padding:7px 12px;border:1px solid var(--border);border-radius:20px;background:var(--bg);color:var(--text);font-size:12px;width:180px;}
.filter-select{padding:7px 14px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface);color:var(--text);font-size:12px;cursor:pointer;}
.filter-select:focus,.filter-input:focus{outline:none;border-color:var(--brand);}

/* TABLE */
.tbl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.tbl-header{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.tbl-title{font-size:13px;font-weight:700;}
.tbl-count{font-size:11px;color:var(--text-3);}
.tbl-scroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{padding:9px 12px;text-align:right;font-size:11px;font-weight:600;color:var(--text-3);background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(139,105,20,.04);}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;white-space:nowrap;}
.badge.منتهية,.badge.منتهي{background:var(--red-bg);color:var(--red);}
.badge.قريب30{background:var(--orange-bg);color:var(--orange);}
.badge.قريب60{background:var(--yellow-bg);color:var(--yellow);}
.badge.قريب90{background:var(--blue-bg);color:var(--blue);}
.badge.سارية,.badge.سارٍ{background:var(--green-bg);color:var(--green);}
.badge.default{background:var(--bg);color:var(--text-3);}

@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(3,1fr);}.charts-grid{grid-template-columns:1fr;}}
@media print{.topbar,.filter-bar,.tabs,.dark-btn,.btn{display:none!important;}body{background:#fff;}@page{size:A4;margin:10mm;}}
</style>

let currentTab = 'active';

// ==================== INIT ====================
const today = new Date();

function getStatus(dateStr) {
  if (!dateStr) return 'بدون';
  const d = new Date(dateStr);
  if (isNaN(d)) return 'بدون';
  const diff = Math.round((d - today) / 86400000);
  if (diff <= 0) return 'منتهية';
  if (diff <= 30) return 'قريب30';
  if (diff <= 60) return 'قريب60';
  if (diff <= 90) return 'قريب90';
  return 'سارية';
}

function getDaysLeft(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  if (isNaN(d)) return null;
  return Math.round((d - today) / 86400000);
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toLocaleDateString('ar-SA');
}

function badge(status) {

  };

}

function fetchCSV(url) {
  const proxies = [
    url,
    'https://api.allorigins.win/get?url=' + encodeURIComponent(url),
    'https://corsproxy.io/?' + encodeURIComponent(url),
  ];
  return new Promise((resolve, reject) => {
    const tryP = (i) => {
      if(i >= proxies.length){ reject(new Error('failed')); return; }
      fetch(proxies[i])
        .then(r => r.ok ? (proxies[i].includes('allorigins') ? r.json() : r.text()) : Promise.reject())
        .then(d => {
          const txt = typeof d==='string' ? d : d.contents;
          if(!txt) throw new Error('empty');
          resolve(parseCsv(txt));
        }).catch(()=>tryP(i+1));
    };
    tryP(0);
  });
}

function parseCsv(csv) {
  const rows=[];let cur='',inQ=false,fields=[];
  for(let i=0;i<csv.length;i++){
    const ch=csv[i];
    if(ch==='"'){if(inQ&&csv[i+1]==='"'){cur+='"';i++;}else{inQ=!inQ;}}
    else if(ch===','&&!inQ){fields.push(cur.trim());cur='';}
    else if(ch==='\n'&&!inQ){fields.push(cur.trim());cur='';rows.push(fields);fields=[];}
    else if(ch==='\r'){}
    else{cur+=ch;}
  }
  if(cur||fields.length){fields.push(cur.trim());rows.push(fields);}
  if(rows.length<2) return [];
  const hdrs=rows[0].map(h=>h.replace(/\n/g,' ').trim());
  return rows.slice(1).map(f=>{const o={};hdrs.forEach((h,j)=>{o[h]=(f[j]||'').trim();});return o;}).filter(o=>Object.values(o).some(v=>v));
}

function g(r, ...keys) {
  for(const k of keys){ const v=r[k]; if(v!==undefined&&String(v).trim()!='') return String(v).trim(); }
  return '';
}

function mapNew(rows) {
  return rows.map((r,i)=>({ no:i+1,
    empId:      g(r,'الرقم الوظيفي ','الرقم الوظيفي'),

}

function mapActive(rows) {
  return rows.map((r,i)=>{ const exp=g(r,'تاريخ انتهاء الاقامة'); return { no:i+1,

    type:       g(r,'نوع الإقامة'),
    empId:      g(r,'الرقم الوظيفي ','الرقم الوظيفي'),
    name:       g(r,'الاسم'),
    job:        g(r,'المهنة'),

    employer:   g(r,'رقم صاحب العمل'),

}

function mapLeave(rows) {

function fetchFromSheet() {
  const dotEl = document.getElementById('connDot');
  const lblEl = document.getElementById('connLabel');
  if(dotEl) dotEl.style.background = '#D97706';
  if(lblEl) lblEl.textContent = 'جارٍ التحديث...';

  Promise.allSettled([
    fetchCSV(ACTIVE_URL),
    fetchCSV(NEW_URL),
    fetchCSV(LEAVE_URL),
    fetchCSV(EXIT_URL),
    fetchCSV(PENDING_URL),
    fetchCSV(EXTEND_URL),
  ]).then(([activeR, newR, leaveR, exitR, pendingR, extendR]) => {
    if(activeR.status==='fulfilled'  && activeR.value.length)  data.active  = mapActive(activeR.value);
    if(newR.status==='fulfilled'     && newR.value.length)     data.new     = mapNew(newR.value);
    if(leaveR.status==='fulfilled'   && leaveR.value.length)   data.leave   = mapLeave(leaveR.value);
    if(exitR.status==='fulfilled'    && exitR.value.length)    data.exit    = mapExit(exitR.value);
    if(pendingR.status==='fulfilled' && pendingR.value.length) data.pending = mapPending(pendingR.value);
    if(extendR.status==='fulfilled'  && extendR.value.length)  data.extend  = mapExtend(extendR.value);

    if(dotEl) dotEl.style.background = '#16A34A';
    if(lblEl) lblEl.textContent = `متصل — ${data.active.length} مقيم | ${data.new.length} جديد | ${data.leave.length} مجاز`;
    renderAll();
  });
}


function refreshData() { fetchFromSheet(); }

    <div class="kpi orange" onclick="filterStatus('قريب30')"><div class="kpi-val">${s30}</div><div class="kpi-lbl">🟠 أقل من 30 يوم</div></div>
    <div class="kpi yellow" onclick="filterStatus('قريب60')"><div class="kpi-val">${s60}</div><div class="kpi-lbl">🟡 أقل من 60 يوم</div></div>
    <div class="kpi blue" onclick="setTab('leave')"><div class="kpi-val">${data.leave.length||61}</div><div class="kpi-lbl">✈️ في إجازة</div></div>

function filterStatus(st) {
  setTab('active');
  document.getElementById('statusFilter').value = st;
  renderTable();
}

// ==================== ALERTS ====================
function renderAlerts() {
  const expired = data.active.filter(r=>r.status==='منتهية');
  const s30     = data.active.filter(r=>r.status==='قريب30');
  if(expired.length===0 && s30.length===0){ document.getElementById('alertBanner').innerHTML=''; return; }

  const items = [
    ...expired.slice(0,5).map(r=>`<div style="padding:3px 0;border-bottom:1px solid rgba(245,158,11,.2)"><span style="background:#FEE2E2;color:#DC2626;padding:1px 7px;border-radius:6px;font-size:10px;font-weight:700;margin-left:6px">منتهية</span>${r.name} — ${r.workplace}</div>`),
    ...s30.slice(0,5).map(r=>`<div style="padding:3px 0;border-bottom:1px solid rgba(245,158,11,.2)"><span style="background:#FED7AA;color:#EA580C;padding:1px 7px;border-radius:6px;font-size:10px;font-weight:700;margin-left:6px">باقي ${r.daysLeft} يوم</span>${r.name} — ${r.workplace}</div>`)
  ];

  document.getElementById('alertBanner').innerHTML = `
    <div class="alert-banner">
      <div class="alert-banner-title">⚠️ تنبيهات الإقامات — ${expired.length} منتهية + ${s30.length} تنتهي قريباً</div>
      <div style="font-size:12px;color:#92400E;line-height:1.9">${items.join('')}${(expired.length+s30.length)>10?`<div style="margin-top:4px;font-size:11px;opacity:.7">... و${(expired.length+s30.length)-10} إقامة أخرى</div>`:''}</div>
    </div>`;
}

// ==================== TABS ====================
const TAB_CONFIG = [
  {key:'active', label:'المقيمين النشطين', dataKey:'active'},
  {key:'new',    label:'حديثي الدخول',     count:15},
  {key:'leave',  label:'المجازون',          count:61},
  {key:'exit',   label:'تأشيرات النهائي',   count:57},
  {key:'pending',label:'تأشيرات مطلوبة',   count:8},
  {key:'extend', label:'تمديد التأشيرات',   count:1},
];

function renderTabs() {
  const expired = data.active.filter(r=>r.status==='منتهية').length;
  const s30 = data.active.filter(r=>r.status==='قريب30').length;
  document.getElementById('tabsRow').innerHTML = TAB_CONFIG.map(t=>{
    const cnt = t.dataKey ? data[t.dataKey].length : (t.count||0);
    const alert = t.key==='active' && (expired+s30)>0 ? `<span class="tab-badge">${expired+s30}⚠️</span>` : `<span class="tab-badge">${cnt}</span>`;
    return `<div class="tab ${currentTab===t.key?'active':''}" onclick="setTab('${t.key}')">${t.label}${alert}</div>`;
  }).join('');
}

function setTab(key) {
  currentTab = key;
  document.getElementById('statusFilter').value = '';
  document.getElementById('searchInput').value = '';
  renderTabs();
  renderTable();
}

// ==================== CHARTS ====================
function renderCharts() {
  if(typeof Chart==='undefined') return;
  if(window.ChartDataLabels) Chart.register(ChartDataLabels);

  const dl = {
    datalabels:{
      display: ctx=>ctx.dataset.data[ctx.dataIndex]>0,
      anchor:'end',align:'end',offset:2,
      color:'var(--brand)',font:{size:11,weight:'700'},
      formatter:v=>v>0?v:''
    }
  };

  const STATUS_COLORS = ['#DC2626','#EA580C','#D97706','#1D4ED8','#16A34A'];
  const STATUS_LABELS = ['منتهية','قريب30','قريب60','قريب90','سارية'];
  const STATUS_NAMES  = ['منتهية','< 30 يوم','< 60 يوم','< 90 يوم','سارية'];

  const counts = STATUS_LABELS.map(s=>data.active.filter(r=>r.status===s).length);

  // Chart 1: Status
  if(chartInst.cStatus) chartInst.cStatus.destroy();
  chartInst.cStatus = new Chart(document.getElementById('cStatus'),{
    type:'bar',
    data:{
      labels: STATUS_NAMES.filter((_,i)=>counts[i]>0),
      datasets:[{
        data: counts.filter(c=>c>0),
        backgroundColor: STATUS_COLORS.filter((_,i)=>counts[i]>0),
        borderRadius:6,borderSkipped:false
      }]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},...dl},scales:{x:{grid:{display:false}},y:{grid:{color:'rgba(0,0,0,.06)'}}}}
  });

  // Chart 2: Workplaces
  const wpCounts = {};
  data.active.forEach(r=>{const w=(r.workplace||'غير محدد').trim().substring(0,20);wpCounts[w]=(wpCounts[w]||0)+1;});
  const wpSorted = Object.entries(wpCounts).sort((a,b)=>b[1]-a[1]).slice(0,7);
  const COLORS = ['#8C6A38','#A07842','#B8924F','#D4AF7A','#C49A6C','#1D4ED8','#16A34A'];

  if(chartInst.cWorkplace) chartInst.cWorkplace.destroy();
  chartInst.cWorkplace = new Chart(document.getElementById('cWorkplace'),{
    type:'bar',
    data:{
      labels:wpSorted.map(x=>x[0]),
      datasets:[{data:wpSorted.map(x=>x[1]),backgroundColor:COLORS.slice(0,wpSorted.length),borderRadius:4,borderSkipped:false}]
    },
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},...dl},scales:{x:{grid:{color:'rgba(0,0,0,.06)'}},y:{grid:{display:false},ticks:{font:{size:9}}}}}
  });

  // Chart 3: Jobs
  const jobCounts = {};
  data.active.forEach(r=>{const j=(r.job||'غير محدد').trim().substring(0,20);jobCounts[j]=(jobCounts[j]||0)+1;});
  const jobSorted = Object.entries(jobCounts).sort((a,b)=>b[1]-a[1]).slice(0,6);

  if(chartInst.cJobs) chartInst.cJobs.destroy();
  chartInst.cJobs = new Chart(document.getElementById('cJobs'),{
    type:'doughnut',
    data:{
      labels:jobSorted.map(x=>x[0]),
      datasets:[{data:jobSorted.map(x=>x[1]),backgroundColor:COLORS,borderWidth:2,borderColor:'var(--surface)'}]
    },
    options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{
      legend:{position:'bottom',labels:{boxWidth:8,font:{size:9},padding:6}},
      datalabels:{display:ctx=>ctx.dataset.data[ctx.dataIndex]>0,color:'#fff',font:{size:10,weight:'700'},formatter:(v,ctx)=>{const t=ctx.dataset.data.reduce((a,b)=>a+b,0);return Math.round(v/t*100)+'%';}}
    }}
  });
}

// ==================== WORKPLACE FILTER ====================
function renderWorkplaceFilter() {
  const sel = document.getElementById('workplaceFilter');
  const workplaces = [...new Set(data.active.map(r=>(r.workplace||'').trim()))].filter(Boolean).sort();
  sel.innerHTML = '<option value="">كل جهات العمل</option>' + workplaces.map(w=>`<option value="${w}">${w}</option>`).join('');
}

// ==================== TABLE ====================
function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const workplace = document.getElementById('workplaceFilter').value;

  let rows = [], headers = [], title = '';

  if(currentTab === 'active') {
    title = 'المقيمين النشطين';
    rows = data.active.filter(r=>{
      if(status && r.status !== status) return false;
      if(workplace && r.workplace !== workplace) return false;
      if(search && !r.name.toLowerCase().includes(search) && !r.id.includes(search) && !r.empId.includes(search)) return false;
      return true;
    });
    headers = ['#','رقم الإقامة','النوع','الرقم الوظيفي','الاسم','المهنة','جهة العمل','تاريخ الانتهاء','الأيام المتبقية','الحالة','ملاحظات'];
    document.getElementById('workplaceFilter').style.display = '';
    document.getElementById('statusFilter').style.display = '';
  } else if(currentTab === 'new') {
    title = 'حديثي الدخول';
    rows = data.new;
    headers = ['#','الرقم الوظيفي','رقم الحدود','رقم الإقامة','الاسم','الجنسية','المهنة','آخر منفذ دخول','انتهاء التأشيرة','الخروج قبل','رقم الجواز','حالة التأمين','الرفع للمالية','ملاحظات'];
    document.getElementById('workplaceFilter').style.display = 'none';
    document.getElementById('statusFilter').style.display = 'none';
  } else if(currentTab === 'leave') {
    title = 'المجازون';
    rows = data.leave;
    headers = ['#','الاسم','رقم الإقامة','الرقم الوظيفي','تاريخ العودة','انتهاء الإقامة','جهة العمل','انتهاء التأشيرة','تاريخ الخروج','تاريخ الدخول','مدة الإجازة','التواجد','حالة التأشيرة'];
    document.getElementById('workplaceFilter').style.display = 'none';
    document.getElementById('statusFilter').style.display = 'none';
  } else if(currentTab === 'exit') {
    title = 'تأشيرات النهائي';
    rows = data.exit;
    headers = ['#','الرقم الوظيفي','رقم الإقامة','الاسم','انتهاء الإقامة','آخر تأشيرة','الإدارة/المشروع','الإخلاء','انتهاء التأشيرة','تاريخ الخروج','ملاحظات'];
    document.getElementById('workplaceFilter').style.display = 'none';
    document.getElementById('statusFilter').style.display = 'none';
  } else if(currentTab === 'pending') {
    title = 'التأشيرات المطلوب إصدارها';
    rows = data.pending;
    headers = ['#','الرقم الوظيفي','رقم الإقامة','الاسم','بداية الإجازة','نهاية الإجازة','انتهاء الإقامة','الإدارة/المشروع','مدة الإجازة','موقف الإقامة والتأشيرة','موقف إخلاء الطرف','ملاحظات'];
    document.getElementById('workplaceFilter').style.display = 'none';
    document.getElementById('statusFilter').style.display = 'none';
  } else {
    title = 'تمديد تأشيرات الخروج والعودة';
    rows = data.extend;
    headers = ['#','الرقم الوظيفي','الاسم','رقم الإقامة','انتهاء الإقامة','انتهاء التأشيرة','الإدارة/المشروع','الذهاب','العودة','ملاحظات'];
    document.getElementById('workplaceFilter').style.display = 'none';
    document.getElementById('statusFilter').style.display = 'none';
  }

  document.getElementById('tblTitle').textContent = title;
  document.getElementById('tblCount').textContent = rows.length + ' سجل';
  document.getElementById('filterCount').textContent = rows.length + ' نتيجة';

  document.getElementById('tblHead').innerHTML = `<tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr>`;

  if(currentTab === 'active') {
    document.getElementById('tblBody').innerHTML = rows.map(r=>`
      <tr>
        <td style="color:var(--text-3)">${r.no}</td>
        <td style="font-family:monospace;font-size:11px">${r.id}</td>
        <td>${r.type}</td>
        <td style="color:var(--text-3)">${r.empId}</td>
        <td style="font-weight:600">${r.name}</td>
        <td style="color:var(--text-3)">${r.job}</td>
        <td>${r.workplace}</td>
        <td style="direction:ltr;text-align:right">${formatDate(r.expiry)}</td>
        <td style="text-align:center">${r.daysLeft!==null?(r.daysLeft<=0?`<span style="color:var(--red);font-weight:700">منذ ${Math.abs(r.daysLeft)} يوم</span>`:`${r.daysLeft} يوم`):'—'}</td>
        <td>${badge(r.status)}</td>
        <td style="font-size:11px;color:var(--text-3)">${r.notes||'—'}</td>
      </tr>`).join('') || '<tr><td colspan="11" style="text-align:center;padding:32px;color:var(--text-3)">لا توجد نتائج</td></tr>';
  } else {
    // Generic row renderer for other tabs
    const keys = {
      new:     ['empId','borderId','iqamaId','name','nationality','job','lastEntry','visaExpiry','exitBefore','passport','insurance','finance','notes'],
      leave:   ['name','id','empId','returnDate','expiry','workplace','visaExpiry','exitDate','entryDate','duration','presence','visaStatus'],
      exit:    ['empId','id','name','expiry','lastVisa','workplace','clearance','visaExpiry','exitDate','notes'],
      pending: ['empId','id','name','leaveStart','leaveEnd','expiry','workplace','duration','iqamaStatus','clearance','notes'],
      extend:  ['empId','name','id','expiry','visaExpiry','workplace','departure','returnDate','notes'],
    };
    const fields = keys[currentTab] || [];
    document.getElementById('tblBody').innerHTML = rows.length === 0
      ? `<tr><td colspan="${headers.length}" style="text-align:center;padding:32px;color:var(--text-3)">اضغط تحديث لتحميل البيانات</td></tr>`
      : rows.map(r=>`<tr><td style="color:var(--text-3)">${r.no}</td>${fields.map(f=>`<td>${r[f]||'—'}</td>`).join('')}</tr>`).join('');
  }
}

// ==================== EXPORT ====================
function exportExcel() {
  if(typeof XLSX==='undefined') return;
  const wb = XLSX.utils.book_new();
  const headers = ['#','رقم الإقامة','النوع','الرقم الوظيفي','الاسم','المهنة','جهة العمل','تاريخ الانتهاء','الأيام المتبقية','الحالة','ملاحظات'];
  const rows = data.active.map(r=>[r.no,r.id,r.type,r.empId,r.name,r.job,r.workplace,r.expiry,r.daysLeft,r.status,r.notes]);
  const ws = XLSX.utils.aoa_to_sheet([headers,...rows]);
  ws['!cols'] = headers.map(()=>({wch:18}));
  XLSX.utils.book_append_sheet(wb,ws,'المقيمين النشطين');
  XLSX.writeFile(wb,'الاقامات_'+new Date().toISOString().split('T')[0]+'.xlsx');
}

function toggleDark() {
  dark=!dark;
  if(dark){document.documentElement.setAttribute('data-dark','1');}
  else{document.documentElement.removeAttribute('data-dark');}
  document.getElementById('darkBtn').textContent=dark?'☀️':'🌙';
}
